<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Crowns - Room Lobby</title>
    <link rel="stylesheet" href="/static/css/site.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .create-room-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .rooms-section h2 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .room-card {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .room-card:hover {
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }
        
        .room-id {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .room-players {
            color: #666;
            font-size: 0.95em;
        }
        
        .join-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-top: 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .join-btn:hover {
            background: #764ba2;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 5 Crowns</h1>
        <p class="subtitle">Choose a room or create a new one</p>
        
        <div class="create-room-section">
            <form method="POST" action="/create_room">
                <button type="submit" class="btn">+ Create New Room</button>
            </form>
        </div>
        
        <div class="rooms-section">
            <h2>Active Rooms</h2>
            {% if rooms %}
                <div class="rooms-grid">
                    {% for room in rooms %}
                        <div class="room-card">
                            <div class="room-id">Room {{ room.id }}</div>
                            <div class="room-players">
                                👥 {{ room.player_count }}/7 Players
                            </div>
                            <a href="/room/{{ room.id }}/" style="text-decoration: none;">
                                <button type="button" class="join-btn">Join Room</button>
                            </a>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty-state">
                    No active rooms. Create one to get started!
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
