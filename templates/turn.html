<style>
    #turn .section-box {
        padding: 10px;
        background-color: #f5f5f5;
        border-radius: 5px;
        margin-bottom: 15px;
        border-left: 4px solid #4CAF50;
    }
    #turn h6 {
        margin: 0 0 5px 0;
        color: #666;
    }
    #turn p {
        margin: 0;
        font-weight: bold;
        color: #333;
    }
</style>
<div id="turn">
    <div class="section-box">
        <h6>Round:</h6>
        <p>{{round_info}}</p>
    </div>
    <div class="section-box">
        <h6>Current Turn:</h6>
        <p>{{turn}}{{suffix}}</p>
    </div>
    <div class="section-box">
        <h6>Dealer:</h6>
        <p>{{dealer}}</p>
    </div>
    <p id="user{{user_id}}" style="display: none;"></p>
    {% if ding %}
    <audio autoplay>
        <source src="/static/ding.mp3">
    </audio>
    {%endif%}
</div>
