<style>
    #actions button {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
    }
    #actions button:hover {
        background-color: #45a049;
    }
</style>{% for action in actions %}
{% if 'disabled' == action.action_status.value %}
{% set visible = "hidden" %}
{% endif %}
<div id="{{action}}">
    <button {{visible}} hx-post="/web/{{room_id}}/{{user_id}}/{{action}}" class="action-button">{{action}}</button>
    <h6 {{visible}}> {{action.text}}</small></h6>
</div>
{% endfor %}
