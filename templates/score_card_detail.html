<style>
    #score_card_detail {
        padding: 10px;
        background-color: #f5f5f5;
        border-radius: 5px;
        margin-bottom: 15px;
        border-left: 4px solid #4CAF50;
    }
    #score_card_detail table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
        border-radius: 4px;
        margin-bottom: 10px;
    }
    #score_card_detail th {
        background-color: #4CAF50;
        color: white;
        padding: 12px;
        text-align: left;
        font-weight: bold;
    }
    #score_card_detail td {
        padding: 10px 12px;
        border-bottom: 1px solid #ddd;
    }
    #score_card_detail tr:hover {
        background-color: #f9f9f9;
    }
    #score_card_detail tr:last-child {
        font-weight: bold;
        background-color: #e8f5e9;
    }
    #score_card_detail button {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
        margin-top: 10px;
    }
    #score_card_detail button:hover {
        background-color: #45a049;
    }
</style>
<div id="score_card_detail" class="section-box">
    <table>
        <tr>
            <th>Round</th>
            {% for name in player_names %}
            <th>{{ name }}</th>
            {% endfor %}
        </tr>
        {% for row in score_card_detail %}
        <tr>
            <td>{{ loop.index +2 }}</td>
            {% for score in row %}
            <td>{{ score }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
        <tr>
            <td>TOTAL</td>
        {% for score in score_card_total %}
        <td>
            {{score}}
        </td>
        {% endfor %}
        </tr>
    </table>
    <button class="close-button" onclick="document.getElementById('scores').innerHTML = ''">Close</button>
</div>
